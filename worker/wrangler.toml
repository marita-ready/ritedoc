name = "readycompliant-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "readycompliant-db"
database_id = "068192b1-a6d0-47c2-a832-ee4870cd1add"

# ─── R2 Bucket ───────────────────────────────────────────────────────────────
# STEP: Enable R2 in Cloudflare Dashboard first, then run:
#   wrangler r2 bucket create readycompliant-cartridges
# Then uncomment the block below and redeploy:
#
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "readycompliant-cartridges"

# ─── Environment Variables ───────────────────────────────────────────────────
[vars]
# PUBLIC_KEY_HEX is the Ed25519 public key for verifying cartridge signatures.
# The private key lives ONLY on Aroha (Marita's laptop) — never on any server.
# Generated by: node tools/generate_keys.js
# Update this value after running the key generation script.
PUBLIC_KEY_HEX = "305c7508ddcf81c2dff3712c6feeb3c86527b3d3021a07850d95d3d10f2dc66e"

# ─── Secrets (set via: wrangler secret put <NAME>) ───────────────────────────
# JWT_SECRET          — random 64-char string for signing admin JWTs
# HMAC_SECRET         — shared secret for RiteDoc app sync requests
# STRIPE_WEBHOOK_SECRET — from Stripe dashboard

[observability]
enabled = true

# ─── Staging Environment ─────────────────────────────────────────────────────
[env.staging]
name = "readycompliant-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "readycompliant-db"
database_id = "068192b1-a6d0-47c2-a832-ee4870cd1add"
