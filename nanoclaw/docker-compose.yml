version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Nanoclaw — llama.cpp HTTP server for RiteDoc
#
# Prerequisites:
#   1. Place the model file at ./models/phi-4-mini-q4_k_m.gguf
#      Download from: https://huggingface.co/microsoft/Phi-4-mini-instruct-gguf
#      (one-time download, ~2.5 GB)
#
#   2. Build the image:
#      docker compose build
#
#   3. Start the server:
#      docker compose up -d
#
#   4. Verify it is running:
#      curl http://localhost:8080/health
#
# The server will be available at http://localhost:8080
# RiteDoc connects to this URL automatically.
# ─────────────────────────────────────────────────────────────────────────────

services:
  nanoclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: nanoclaw:latest
    container_name: nanoclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount the models directory read-only
      # Place phi-4-mini-q4_k_m.gguf inside ./models/
      - ./models:/models:ro
    environment:
      MODEL_PATH: /models/phi-4-mini-q4_k_m.gguf
      HOST: 0.0.0.0
      PORT: "8080"
      CTX_SIZE: "4096"
      THREADS: "4"
      BATCH_SIZE: "512"
    # Limit memory to prevent OOM on lower-spec machines
    # Phi-4-mini Q4_K_M requires ~3 GB RAM; adjust as needed
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # No network access required at runtime — model is local
    network_mode: bridge
